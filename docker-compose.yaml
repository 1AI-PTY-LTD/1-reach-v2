# for local dev only

services:
  db:
    image: postgres:16
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"  # expose the port for dbeaver etc
    env_file:
      - backend/.env

  backend:
    image: python:latest
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    image: python:latest
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A app.celery worker --loglevel=INFO --concurrency=4 -Q default,messages"
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    image: python:latest
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A app.celery beat --loglevel=INFO"
    volumes:
      - ./backend:/app
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-bookworm-slim
    working_dir: /frontend
    command: sh -c "npm install && npm run dev -- --host"  # this is only intended for dev!
    volumes:
      - ./frontend:/frontend
    ports:
      - "5173:5173"
    env_file:
      - frontend/.env
    # Required for Playwright/Chromium to run inside the container
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_PTRACE

volumes:
  postgres_data:
