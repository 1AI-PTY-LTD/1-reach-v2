name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get runner IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Add runner IP to PostgreSQL firewall
        run: |
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --rule-name github-runner \
            --start-ip-address ${{ steps.ip.outputs.ip }} \
            --end-ip-address ${{ steps.ip.outputs.ip }}

      - name: Check for pending migrations
        id: check
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ secrets.AZURE_POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: "5432"
        run: |
          if python manage.py migrate --check 2>/dev/null; then
            echo "No pending migrations — skipping replica test."
            echo "pending=false" >> "$GITHUB_OUTPUT"
          else
            echo "Pending migrations detected:"
            python manage.py showmigrations --plan | grep "\[ \]" || true
            echo "pending=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and promote DB replica
        if: steps.check.outputs.pending == 'true'
        id: replica
        run: |
          REPLICA_NAME="${{ secrets.AZURE_POSTGRES_SERVER_NAME }}-replica"
          echo "Creating replica: $REPLICA_NAME"
          az postgres flexible-server replica create \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --source-server ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --replica-name "$REPLICA_NAME"
          echo "Promoting replica to read-write..."
          az postgres flexible-server replica stop-replication \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "$REPLICA_NAME" --yes
          REPLICA_HOST=$(az postgres flexible-server show \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "$REPLICA_NAME" \
            --query fullyQualifiedDomainName -o tsv)
          echo "host=$REPLICA_HOST" >> "$GITHUB_OUTPUT"
          echo "name=$REPLICA_NAME" >> "$GITHUB_OUTPUT"

      - name: Test migration on replica
        if: steps.check.outputs.pending == 'true'
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ steps.replica.outputs.host }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: "5432"
        run: |
          echo "Pending migrations:"
          python manage.py showmigrations --plan | grep "\[ \]" || echo "  (none)"
          echo "Running test migration on replica..."
          python manage.py migrate --no-input

      - name: Backup production DB
        if: steps.check.outputs.pending == 'true'
        run: |
          BACKUP_NAME="pre-deploy-$(date -u +%Y%m%d-%H%M%S)"
          echo "Creating production backup: $BACKUP_NAME"
          az postgres flexible-server backup create \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --backup-name "$BACKUP_NAME"
          echo "Backup created: $BACKUP_NAME"

      - name: Run migration on production DB
        if: steps.check.outputs.pending == 'true'
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ secrets.AZURE_POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: "5432"
        run: python manage.py migrate --no-input

      - name: Delete replica
        if: steps.check.outputs.pending == 'true' && always()
        run: |
          az postgres flexible-server delete \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "${{ steps.replica.outputs.name }}" --yes 2>/dev/null || true

      - name: Remove runner IP from firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --rule-name github-runner --yes 2>/dev/null || true

  build:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend
          retention-days: 7

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend

  deploy-worker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — celery-worker
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WORKER_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}
          package: backend

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart worker
        run: |
          az webapp stop --name ${{ secrets.AZURE_WORKER_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
          sleep 5
          az webapp start --name ${{ secrets.AZURE_WORKER_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

  deploy-beat:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — celery-beat
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BEAT_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BEAT_PUBLISH_PROFILE }}
          package: backend

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart beat
        run: |
          az webapp stop --name ${{ secrets.AZURE_BEAT_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
          sleep 5
          az webapp start --name ${{ secrets.AZURE_BEAT_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

  verify-health:
    needs: [deploy-api, deploy-worker, deploy-beat]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for API to be healthy
        run: |
          URL="${{ secrets.VITE_API_BASE_URL }}/api/health/"
          echo "Polling $URL for healthy response..."
          for i in $(seq 1 30); do
            RESP=$(curl -s -w "\n%{http_code}" --connect-timeout 5 --max-time 10 "$URL" 2>/dev/null) || true
            STATUS=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "Attempt $i/30: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "API did not become healthy within 5 minutes."
          exit 1
