name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get runner IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Add runner IP to PostgreSQL firewall
        run: |
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --rule-name github-runner \
            --start-ip-address ${{ steps.ip.outputs.ip }} \
            --end-ip-address ${{ steps.ip.outputs.ip }}

      - name: Check for pending migrations
        id: check
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ secrets.AZURE_POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.AZURE_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.AZURE_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.AZURE_POSTGRES_PASSWORD }}
          POSTGRES_PORT: "5432"
        run: |
          # First verify we can connect to the database
          python -c "
          import django, os
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'app.settings')
          django.setup()
          from django.db import connection
          connection.ensure_connection()
          print('Database connection OK')
          " || { echo "::error::Cannot connect to production database. Check AZURE_POSTGRES_HOST secret."; exit 1; }

          if python manage.py migrate --check; then
            echo "No pending migrations — skipping replica test."
            echo "pending=false" >> "$GITHUB_OUTPUT"
          else
            echo "Pending migrations detected:"
            python manage.py showmigrations --plan | grep "\[ \]" || true
            echo "pending=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check DB tier
        if: steps.check.outputs.pending == 'true'
        id: tier
        run: |
          SKU_TIER=$(az postgres flexible-server show \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --query sku.tier -o tsv)
          echo "DB tier: $SKU_TIER"
          echo "tier=$SKU_TIER" >> "$GITHUB_OUTPUT"
          if [ "$SKU_TIER" = "Burstable" ]; then
            echo "supports_replica=false" >> "$GITHUB_OUTPUT"
          else
            echo "supports_replica=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and promote DB replica
        if: steps.check.outputs.pending == 'true' && steps.tier.outputs.supports_replica == 'true'
        id: replica
        run: |
          REPLICA_NAME="${{ secrets.AZURE_POSTGRES_SERVER_NAME }}-replica"
          echo "name=$REPLICA_NAME" >> "$GITHUB_OUTPUT"
          echo "Creating replica: $REPLICA_NAME"
          az postgres flexible-server replica create \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --source-server ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --name "$REPLICA_NAME"
          echo "Promoting replica to read-write..."
          az postgres flexible-server replica promote \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "$REPLICA_NAME" --yes
          echo "Adding runner IP to replica firewall..."
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "$REPLICA_NAME" \
            --rule-name github-runner \
            --start-ip-address ${{ steps.ip.outputs.ip }} \
            --end-ip-address ${{ steps.ip.outputs.ip }}
          REPLICA_HOST=$(az postgres flexible-server show \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "$REPLICA_NAME" \
            --query fullyQualifiedDomainName -o tsv)
          echo "host=$REPLICA_HOST" >> "$GITHUB_OUTPUT"

      - name: Test migration on replica
        if: steps.check.outputs.pending == 'true' && steps.tier.outputs.supports_replica == 'true'
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ steps.replica.outputs.host }}
          POSTGRES_DB: ${{ secrets.AZURE_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.AZURE_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.AZURE_POSTGRES_PASSWORD }}
          POSTGRES_PORT: "5432"
        run: |
          echo "Pending migrations:"
          python manage.py showmigrations --plan | grep "\[ \]" || echo "  (none)"
          echo "Running test migration on replica..."
          python manage.py migrate --no-input

      - name: Backup production DB
        if: steps.check.outputs.pending == 'true' && steps.tier.outputs.supports_replica == 'true'
        run: |
          BACKUP_NAME="pre-deploy-$(date -u +%Y%m%d-%H%M%S)"
          echo "Creating production backup: $BACKUP_NAME"
          az postgres flexible-server backup create \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --backup-name "$BACKUP_NAME"
          echo "Backup created: $BACKUP_NAME"

      - name: Run migration on production DB
        if: steps.check.outputs.pending == 'true'
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: test-migration-key
          POSTGRES_HOST: ${{ secrets.AZURE_POSTGRES_HOST }}
          POSTGRES_DB: ${{ secrets.AZURE_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.AZURE_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.AZURE_POSTGRES_PASSWORD }}
          POSTGRES_PORT: "5432"
        run: python manage.py migrate --no-input

      - name: Delete replica
        if: steps.check.outputs.pending == 'true' && steps.tier.outputs.supports_replica == 'true' && always()
        run: |
          az postgres flexible-server delete \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name "${{ steps.replica.outputs.name }}" --yes 2>/dev/null || true

      - name: Remove runner IP from firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ secrets.AZURE_POSTGRES_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --rule-name github-runner --yes 2>/dev/null || true

  build:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build virtualenv
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --no-cache-dir -r requirements.txt

      - name: Collect static files
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: app.settings
          DJANGO_SECRET_KEY: build-collectstatic-key
        run: |
          source antenv/bin/activate
          python manage.py collectstatic --no-input

      - name: Patch venv for Azure App Service
        working-directory: backend
        run: |
          sed -i "s|^home = .*|home = /usr/local/bin|" antenv/pyvenv.cfg
          sed -i "s|^#\!/.*python.*|#!/home/site/wwwroot/antenv/bin/python|" antenv/bin/*
          # Fix python symlinks to point to Azure's Python 3.12
          rm antenv/bin/python3
          ln -s /usr/local/bin/python3.12 antenv/bin/python3
          rm -f antenv/bin/python3.12
          ln -s /usr/local/bin/python3.12 antenv/bin/python3.12

      - name: Stamp deploy version
        run: sed -i "s/DEPLOY_SHA = 'dev'/DEPLOY_SHA = '${{ github.sha }}'/" backend/app/health.py

      - name: Create deploy package
        run: cd backend && zip -qr ../backend.zip . -x ".git/*" "__pycache__/*" "*.pyc" "tests/*"

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend.zip
          retention-days: 7

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable Run From Package
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.AZURE_BACKEND_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 \
            --output none

      - name: Deploy zip package
        run: |
          az webapp deploy \
            --name ${{ secrets.AZURE_BACKEND_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src-path backend.zip \
            --type zip \
            --async true

  deploy-worker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable Run From Package
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.AZURE_WORKER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 \
            --output none

      - name: Deploy zip package
        run: |
          az webapp deploy \
            --name ${{ secrets.AZURE_WORKER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src-path backend.zip \
            --type zip \
            --async true

      - name: Restart worker
        run: |
          az webapp stop --name ${{ secrets.AZURE_WORKER_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
          sleep 5
          az webapp start --name ${{ secrets.AZURE_WORKER_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

  deploy-beat:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable Run From Package
        run: |
          az webapp config appsettings set \
            --name ${{ secrets.AZURE_BEAT_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 \
            --output none

      - name: Deploy zip package
        run: |
          az webapp deploy \
            --name ${{ secrets.AZURE_BEAT_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src-path backend.zip \
            --type zip \
            --async true

      - name: Restart beat
        run: |
          az webapp stop --name ${{ secrets.AZURE_BEAT_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
          sleep 5
          az webapp start --name ${{ secrets.AZURE_BEAT_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

  verify-health:
    needs: [deploy-api, deploy-worker, deploy-beat]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for new instance (smoke test + version check)
        run: |
          URL="${{ secrets.VITE_API_BASE_URL }}/api/health/smoke/"
          EXPECTED_SHA="${{ github.sha }}"
          echo "Polling $URL until version=$EXPECTED_SHA..."
          for i in $(seq 1 30); do
            RESP=$(curl -s -w "\n%{http_code}" --connect-timeout 5 --max-time 15 "$URL" 2>/dev/null) || true
            STATUS=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "Attempt $i/30: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q "$EXPECTED_SHA"; then
              echo "New instance confirmed — smoke test passed."
              exit 0
            fi
            sleep 10
          done
          echo "New instance did not become healthy within 5 minutes."
          exit 1

      - name: Create Sentry release
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_BACKEND }}
        with:
          environment: production
          version: ${{ github.sha }}
