name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend

  deploy-worker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — celery-worker
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WORKER_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}
          package: backend

      - name: Restart worker
        run: |
          USER=$(echo '${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}' | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo '${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}' | grep -oP 'userPWD="\K[^"]+' | head -1)
          curl -X POST "https://${{ secrets.AZURE_WORKER_APP_NAME }}.scm.azurewebsites.net/api/restart" \
            -u "$USER:$PASS" --max-time 60 -s -o /dev/null -w "HTTP %{http_code}\n"

  deploy-beat:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — celery-beat
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BEAT_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BEAT_PUBLISH_PROFILE }}
          package: backend

      - name: Restart beat
        run: |
          USER=$(echo '${{ secrets.AZURE_BEAT_PUBLISH_PROFILE }}' | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo '${{ secrets.AZURE_BEAT_PUBLISH_PROFILE }}' | grep -oP 'userPWD="\K[^"]+' | head -1)
          curl -X POST "https://${{ secrets.AZURE_BEAT_APP_NAME }}.scm.azurewebsites.net/api/restart" \
            -u "$USER:$PASS" --max-time 60 -s -o /dev/null -w "HTTP %{http_code}\n"

  verify-health:
    needs: [deploy-api, deploy-worker, deploy-beat]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for API to be healthy
        run: |
          URL="${{ secrets.VITE_API_BASE_URL }}/api/health/"
          echo "Polling $URL for healthy response..."
          for i in $(seq 1 30); do
            RESP=$(curl -s -w "\n%{http_code}" --connect-timeout 5 --max-time 10 "$URL" 2>/dev/null) || true
            STATUS=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "Attempt $i/30: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "API did not become healthy within 5 minutes."
          exit 1
