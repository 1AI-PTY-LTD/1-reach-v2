name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create pre-deploy database backup
        run: |
          BACKUP_NAME="pre-deploy-$(date -u +%Y%m%d-%H%M%S)"
          echo "Creating backup: $BACKUP_NAME"
          az postgres flexible-server backup create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \
            --backup-name "$BACKUP_NAME"
          echo "✓ Backup created: $BACKUP_NAME"
          echo "  To restore: az postgres flexible-server restore \\"
          echo "    --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \\"
          echo "    --name <new-server-name> \\"
          echo "    --source-server ${{ secrets.AZURE_POSTGRES_SERVER_NAME }} \\"
          echo "    --backup-name $BACKUP_NAME"

  build:
    needs: pre-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend
          retention-days: 7

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend

  deploy-worker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — celery-worker
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WORKER_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WORKER_PUBLISH_PROFILE }}
          package: backend

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart worker
        run: |
          az webapp stop --name ${{ secrets.AZURE_WORKER_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
          sleep 5
          az webapp start --name ${{ secrets.AZURE_WORKER_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

  deploy-beat:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Deploy to Azure App Service — celery-beat
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BEAT_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BEAT_PUBLISH_PROFILE }}
          package: backend

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart beat
        run: |
          az webapp stop --name ${{ secrets.AZURE_BEAT_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
          sleep 5
          az webapp start --name ${{ secrets.AZURE_BEAT_APP_NAME }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

  verify-health:
    needs: [deploy-api, deploy-worker, deploy-beat]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for API to be healthy
        run: |
          URL="${{ secrets.VITE_API_BASE_URL }}/api/health/"
          echo "Polling $URL for healthy response..."
          for i in $(seq 1 30); do
            RESP=$(curl -s -w "\n%{http_code}" --connect-timeout 5 --max-time 10 "$URL" 2>/dev/null) || true
            STATUS=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "Attempt $i/30: HTTP $STATUS — $BODY"
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "API did not become healthy within 5 minutes."
          exit 1
