name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run backend tests
        run: docker compose run --rm backend python -m pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run frontend tests
        run: docker compose run --rm frontend npx vitest run

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Svix CLI
        run: npm install -g @svix/cli

      - name: Start Svix listener (tunnel Clerk webhooks to localhost)
        run: |
          svix listen http://localhost:8000/api/webhooks/clerk/ > /tmp/svix-output.txt 2>&1 &
          for i in $(seq 1 15); do
            SVIX_URL=$(grep -oP 'https://play\.svix\.com/in/[^/\s]+/' /tmp/svix-output.txt 2>/dev/null)
            [ -n "$SVIX_URL" ] && break
            sleep 1
          done
          echo "SVIX_URL=$SVIX_URL" >> $GITHUB_ENV
          echo "Svix tunnel URL: $SVIX_URL"

      - name: Update Clerk webhook endpoint to Svix play URL
        env:
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          E2E_CLERK_WEBHOOK_ENDPOINT_ID: ${{ secrets.E2E_CLERK_WEBHOOK_ENDPOINT_ID }}
        run: |
          curl -s -X PATCH "https://api.clerk.com/v1/webhooks/${E2E_CLERK_WEBHOOK_ENDPOINT_ID}" \
            -H "Authorization: Bearer ${E2E_CLERK_SECRET_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"${SVIX_URL}\"}"

      - name: Create backend/.env
        run: |
          cat > backend/.env <<'EOF'
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DEBUG=0
          TEST=1
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          ALLOWED_HOSTS=localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS=http://localhost:5173
          CLERK_FRONTEND_API=${{ secrets.E2E_CLERK_FRONTEND_API }}
          CLERK_SECRET_KEY=${{ secrets.E2E_CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SIGNING_SECRET=${{ secrets.E2E_CLERK_WEBHOOK_SIGNING_SECRET }}
          CLERK_AUTHORIZED_PARTIES=http://localhost:5173
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          FREE_CREDIT_AMOUNT=10.00
          SMS_RATE=0.05
          MMS_RATE=0.20
          EOF

      - name: Create frontend/.env
        run: |
          cat > frontend/.env <<'EOF'
          VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.E2E_VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL=http://localhost:8000
          EOF

      - name: Start services
        run: docker compose up -d db redis backend frontend --wait --wait-timeout 120

      - name: Run migrations
        run: docker compose exec -T backend python manage.py migrate --noinput

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: frontend
        env:
          # clerkSetup() reads CLERK_PUBLISHABLE_KEY (not VITE_CLERK_PUBLISHABLE_KEY)
          CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Stop Svix listener
        if: always()
        run: pkill -f 'svix listen' || true

      - name: Stop services
        if: always()
        run: docker compose down
